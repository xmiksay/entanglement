# Embedded provider/model catalog — entanglement defaults.
#
# Deep-merged under an optional user override at
# `${dirs::config_dir}/entanglement/providers.yml` (override the whole path via
# `ENTANGLEMENT_PROVIDERS_FILE`). Merge identity: providers by `name`, models by
# `id`. See `catalog.rs` for the schema and merge semantics.
#
# Pricing is USD per million tokens. Only well-documented public rates are
# filled in; unknown rates are left unset rather than invented. Ollama is local,
# so it carries no pricing.
#
# `rpm` (optional, per provider) is the requests-per-minute budget for that
# provider's endpoint bucket. It is left unset here — like unknown pricing — so
# each endpoint falls back to the client default (RetryConfig::rpm, 50);
# override per provider in your user `providers.yml` or via `{NAME}_RPM`.
#
# `concurrency` (optional, per provider) caps simultaneously in-flight requests
# to that provider's endpoint (the primary spawn-storm guard). Left unset here
# so each endpoint falls back to the client default (RetryConfig::concurrency,
# 3); override per provider in your user `providers.yml` or via
# `{NAME}_CONCURRENCY` (falls back to the global `ENTANGLEMENT_MAX_CONCURRENCY`
# when neither is set).
#
# Capability flags gate the generation-parameter channel (#191): the head sends a
# model's `default_temperature` only when `supports_temperature`, and extended
# thinking only when `supports_thinking` AND a `thinking_budget_tokens` is set.
# Budgets are left unset here so thinking stays off until you opt in — add
# `thinking_budget_tokens: <n>` to a thinking-capable model in your user file.
#
# Provider order is also the key auto-detect priority (z.ai first).

providers:
  - name: zai
    base_url: https://api.z.ai/api/coding/paas/v4
    key_env: ZAI_API_KEY
    default_model: glm-5.2
    # Full z.ai text palette (docs.z.ai/guides/overview/pricing, fetched
    # 2026-07-15). glm-5.2 stays first — the auto-detect default and the
    # `default_model` above; `builtin_parses` asserts the ordering. Pricing is
    # USD per million tokens (input / output / cached_input). Free tiers carry
    # explicit zeros. `supports_thinking` is true everywhere except the
    # non-reasoning glm-4-32b-0414-128k. (4.7-flash/flashx limits assumed = the
    # 4.7 family; not individually documented.)
    models:
      - id: glm-5.2
        display_name: GLM-5.2
        context_window: 1000000
        max_output_tokens: 131072
        supports_thinking: true
        default_temperature: 0.7
        pricing:
          input: 1.4
          output: 4.4
          cached_input: 0.26
