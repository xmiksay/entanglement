[workspace]
members = ["brain-core", "brain-llm", "brain-stdio"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.82"
license = "MIT"
repository = "https://github.com/xmiksay/brain"

[workspace.dependencies]
brain-core = { path = "brain-core" }
brain-llm = { path = "brain-llm" }

tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
async-stream = "0.3"
futures = "0.3"
clap = { version = "4", features = ["derive"] }
# rustls (not native-tls) so builds need no system OpenSSL headers.
reqwest = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls", "charset"] }

[profile.release]
lto = "thin"
codegen-units = 1
