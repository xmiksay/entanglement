# entanglement — user configuration.
#
# This starter file was scaffolded on first run (#219). Every setting is a
# fallback and every line below is commented out, so this file changes nothing
# until you edit it: uncomment a key and give it a value to override the built-in
# default. An explicit CLI flag or environment variable always wins over this
# file (env > config > embedded default).
#
# Layered like every other definition in the codebase (ADR-0047):
#   embedded default  <  this file  <  <root>/.entanglement/config.yml
# Later layers win; mappings merge key-wise, scalars are replaced. A malformed
# file is a loud error, never a silent fallback.

# Default agent profile when none is passed on the CLI (`--agent`).
# One of: build | plan | explore (or any custom agent you define).
#agent: build

# Provider selection, mirroring ENTANGLEMENT_PROVIDER
# (zai | openai | ollama | anthropic | echo | any catalog name).
# Leave commented to auto-detect by which API key is present.
#provider: zai

# Model id override. Leave commented for the selected provider's catalog default
# (or its {NAME}_MODEL env var, which still wins).
#model: glm-5.2

# Log at `debug` by default, as `--verbose` does (RUST_LOG always wins).
#verbose: false

# Permissions — a global ceiling combined least-privilege with each agent
# profile: a rule here can only *tighten* what an agent allows, never loosen it.
# Tool name → allow | ask | deny; the reserved `default` key sets the fallback
# for any unlisted tool. Argument/path-scoped keys work too, e.g. `bash(rm *)`.
# The built-in default is allow-all, so an untouched block changes nothing.
#permissions:
#  default: allow
#  bash: ask
#  bash(rm *): deny

# Lifecycle hooks — external commands run around tool execution and on prompt
# ingress (policy / telemetry / formatting). Each command runs via `sh -c` with
# the event JSON on stdin and ENTANGLEMENT_HOOK_EVENT / _SESSION_ID / _TOOL_NAME
# in the env. `tools` (tool hooks only) scopes a hook to named tools; omit for
# all. `timeout_secs` defaults to 30.
#   pre_tool_use       — before a tool runs; a NON-ZERO EXIT BLOCKS the tool.
#   post_tool_use      — after the result; observational side-effect only.
#   user_prompt_submit — when a prompt arrives; observational.
#hooks:
#  pre_tool_use:
#    - command: "jq -e '.input.command | test(\"rm -rf\") | not'"
#      tools: [bash]
#  post_tool_use:
#    - command: "jq -r '.input.path' | xargs -r prettier --write"
#      tools: [write, edit]
#  user_prompt_submit:
#    - command: "logger -t entanglement-prompt"

# MCP servers — attach external tool servers (#198, #312). Each entry registers a
# server's tools into the engine, named `mcp__<server>__<tool>`. They obey the same
# permission profiles as host tools. A server that fails to connect is logged and
# skipped, never fatal. Each block picks ONE transport — `command` XOR `url`:
#
#   stdio (local subprocess, JSON-RPC over stdio):
#     command   — executable to spawn (looked up on PATH)
#     args      — argument list (default [])
#     env       — extra environment variables (default {})
#   http (remote, streamable-HTTP transport — needs the `mcp-http` build feature):
#     url       — the server's endpoint (e.g. https://example.com/mcp)
#     headers   — static request headers; values may use ${VAR} from the env
#
#   disabled     — skip this server without deleting the block (both transports)
#   capabilities — (#426) map a server's raw tool name to `read`/`write`/`call` so
#                  a bare `permissions: { read: allow }` above also covers it —
#                  an MCP tool isn't self-describing, so without this hint it only
#                  ever grades as its own literal `mcp__<server>__<tool>` name.
#mcp:
#  everything:
#    command: npx
#    args: ["-y", "@modelcontextprotocol/server-everything"]
#    env:
#      EXAMPLE_TOKEN: "…"
#    capabilities:
#      search: read
#  my-remote:
#    url: https://example.com/mcp
#    headers:
#      Authorization: "Bearer ${MY_MCP_TOKEN}"

# Web search — opt-in, provider-side (#305). When enabled, the provider runs a
# web search MID-TURN, server-side (z.ai and Anthropic only), and cites the
# results; there is no client tool round-trip. ENABLING THIS IS YOUR CONSENT: the
# search runs provider-side, OUTSIDE the runtime permission ladder — no per-call
# approval prompt gates it. Results surface as reasoning lines, not persisted into
# conversation history (ADR-0075). Disabled by default.
#   max_uses        — cap the searches per turn (default: the provider's own).
#   allowed_domains — restrict searches to these domains (default: no restriction).
#web_search:
#  enabled: true
#  max_uses: 5
#  allowed_domains: [docs.rs, doc.rust-lang.org]

# Cap on the inner LLM→tool loop within a single turn (#177): the max number of
# LLM round-trips (each possibly fanning out into tool calls) before a runaway
# turn is halted. The counter resets per prompt, so a long session of many short
# prompts is never capped — only a single wedged turn. Default 200.
#max_turns: 200

# Auto-hibernate a settled session (no in-flight turn, and none in its spawned
# sub-tree) after this many idle seconds (#401, ADR-0090). Evicts the session's
# in-memory state without tombstoning it — `Holly::resume` rebuilds it from the
# event log on its next message. Leave commented to disable the sweep entirely
# (the default): eviction then stays embedder-driven. Mainly useful for a
# long-lived multi-session embedder such as `skutter serve`; a background sweep
# never touches a session mid-turn, so this can't cancel in-flight work.
#idle_ttl_secs: 1800

# Editor the TUI opens for `/editor` (the $EDITOR round-trip). When set, this
# WINS OVER $VISUAL/$EDITOR — the persisted choice is the default regardless of
# the shell env. Leave commented to fall back to $VISUAL → $EDITOR → vi.
# Word-split like a shell command, so flags work, e.g. "code --wait".
#editor: nvim
